default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", ENV.fetch("MYSQL_USER", "root")) %>
  password: <%= ENV.fetch("DB_PASSWORD", ENV.fetch("MYSQL_PASSWORD", "")) %>
  host: <%= ENV.fetch("DB_HOST", ENV.fetch("MYSQL_HOST", "localhost")) %>
  port: <%= ENV.fetch("DB_PORT", ENV.fetch("MYSQL_PORT", 3306)) %>

development:
  adapter: sqlite3
  database: <%= ENV.fetch("DB_NAME_DEVELOPMENT", Rails.root.join("db", "development.sqlite3")) %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  adapter: sqlite3
  database: <%= ENV.fetch("DB_NAME_TEST", Rails.root.join("db", "test.sqlite3")) %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_PRODUCTION", "store_production") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_CACHE", "store_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_QUEUE", "store_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_CABLE", "store_production_cable") %>
    migrations_paths: db/cable_migrate
